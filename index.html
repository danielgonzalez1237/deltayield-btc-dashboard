        <span>Slip: {D.params.slip*100}%</span>
        <span>Hedge: {D.params.hr*100}%</span>
      </div>
    </div>
  );
}

function Metric({label,value,sub,color}){
  return(
    <div className="metric">
      <div className="metric-label">{label}</div>
      <div className="metric-value" style={{color:color||C.txt}}>{value}</div>
      {sub&&<div style={{fontSize:12,color:C.dim,marginTop:2}}>{sub}</div>}
    </div>
  );
}

function BalanceChart({keys}){
  const merged=useMemo(()=>{
    const m={};
    keys.forEach(k=>{
      const s=D.sc[k];if(!s)return;
      s.daily.forEach(d=>{
        if(!m[d.d])m[d.d]={date:d.d};
        m[d.d][k]=d.b;
      });
    });
    return Object.values(m).sort((a,b)=>a.date.localeCompare(b.date));
  },[keys]);

  return(
    <ResponsiveContainer width="100%" height={400}>
      <LineChart data={merged} margin={{top:10,right:20,bottom:10,left:20}}>
        <CartesianGrid strokeDasharray="3 3" stroke="#1a1a2e"/>
        <XAxis dataKey="date" tick={{fontSize:11,fill:'#888'}} tickFormatter={v=>v.substring(0,7)} interval={Math.floor(merged.length/8)}/>
        <YAxis tick={{fontSize:11,fill:'#888'}} domain={['auto','auto']} tickFormatter={v=>v.toFixed(2)}/>
        <Tooltip contentStyle={{background:'#1a1a2e',border:'1px solid #2a2a3e',borderRadius:8}}
          formatter={(v,name)=>[v.toFixed(6)+' BTC',SL[name]||name]} labelFormatter={l=>l}/>
        <ReferenceLine y={1} stroke="#444" strokeDasharray="5 5"/>
        {keys.map(k=><Line key={k} type="monotone" dataKey={k} stroke={SC[k]} strokeWidth={2} dot={false}/>)}
      </LineChart>
    </ResponsiveContainer>
  );
}

function PnLBars({scenario}){
  const s=D.sc[scenario];if(!s)return null;
  const items=[
    {name:'Fees',v:s.fees,c:C.grn},{name:'Hedge',v:s.hedge,c:C.sec},
    {name:'IL',v:s.il,c:C.red},{name:'Gas',v:-s.gas,c:'#ff9f43'},
    {name:'Slippage',v:-s.slip,c:'#ee5a24'},{name:'Perp',v:-s.perp,c:C.pur}
  ];
  return(
    <div>
      <h3 style={{fontSize:16,fontWeight:600,marginBottom:12,color:C.pri}}>P&L — {SL[scenario]}</h3>
      <ResponsiveContainer width="100%" height={220}>
        <BarChart data={items} layout="vertical" margin={{left:70,right:40}}>
          <CartesianGrid strokeDasharray="3 3" stroke="#1a1a2e"/>
          <XAxis type="number" tick={{fontSize:11,fill:'#888'}} tickFormatter={v=>v.toFixed(3)}/>
          <YAxis type="category" dataKey="name" tick={{fontSize:12,fill:'#ccc'}} width={70}/>
          <Tooltip contentStyle={{background:'#1a1a2e',border:'1px solid #2a2a3e',borderRadius:8}} formatter={v=>[v.toFixed(6)+' BTC']}/>
          <Bar dataKey="v" radius={[0,4,4,0]}>{items.map((e,i)=><Cell key={i} fill={e.c}/>)}</Bar>
        </BarChart>
      </ResponsiveContainer>
      <div className="grid-3" style={{marginTop:12}}>
        {items.map((it,i)=>(
          <div key={i} className="pnl-item" style={{borderLeft:'3px solid '+it.c}}>
            <div style={{fontSize:11,color:'#888'}}>{it.name}</div>
            <div style={{fontSize:15,fontWeight:600,color:it.v>=0?C.grn:C.red}}>
              {it.v>=0?'+':''}{it.v.toFixed(6)} BTC
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CostTable(){
  const sc=D.sc;
  return(
    <div style={{overflowX:'auto'}}>
      <table>
        <thead><tr>
          <th>Scenario</th><th className="text-right" style={{color:C.grn}}>Fees</th>
          <th className="text-right" style={{color:C.sec}}>Hedge</th>
          <th className="text-right" style={{color:C.red}}>IL</th>
          <th className="text-right" style={{color:'#ff9f43'}}>Gas</th>
          <th className="text-right" style={{color:'#ee5a24'}}>Slip</th>
          <th className="text-right" style={{color:C.pur}}>Perp</th>
          <th className="text-right" style={{fontWeight:700}}>Net BTC</th>
          <th className="text-right" style={{fontWeight:700}}>Net%</th>
        </tr></thead>
        <tbody>
          {Object.entries(sc).map(([k,v])=>{
            const net=v.fees+v.hedge+v.il-v.gas-v.slip-v.perp;
            return(
              <tr key={k}>
                <td style={{fontWeight:600,color:SC[k]}}>{SL[k]}</td>
                <td className="text-right" style={{color:C.grn}}>{fmt(v.fees,6)}</td>
                <td className="text-right" style={{color:C.sec}}>{fmt(v.hedge,6)}</td>
                <td className="text-right" style={{color:C.red}}>{fmt(v.il,6)}</td>
                <td className="text-right">{fmt(v.gas,6)}</td>
                <td className="text-right">{fmt(v.slip,6)}</td>
                <td className="text-right">{fmt(v.perp,6)}</td>
                <td className="text-right" style={{fontWeight:700,color:net>=0?C.grn:C.red}}>{fmt(net,6)}</td>
                <td className="text-right" style={{fontWeight:700,color:net>=0?C.grn:C.red}}>{(net*100).toFixed(2)}%</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function FundingChart(){
  return(
    <ResponsiveContainer width="100%" height={300}>
      <LineChart data={D.fn} margin={{top:10,right:20,bottom:10,left:20}}>
        <CartesianGrid strokeDasharray="3 3" stroke="#1a1a2e"/>
        <XAxis dataKey="d" tick={{fontSize:11,fill:'#888'}} tickFormatter={v=>v.substring(0,7)} interval={Math.floor(D.fn.length/8)}/>
        <YAxis tick={{fontSize:11,fill:'#888'}} tickFormatter={v=>v+'%'}/>
        <Tooltip contentStyle={{background:'#1a1a2e',border:'1px solid #2a2a3e',borderRadius:8}} formatter={(v,n)=>[v.toFixed(2)+'% ann.',n]}/>
        <ReferenceLine y={0} stroke="#444"/>
        <Line type="monotone" dataKey="bn" stroke={C.amb} strokeWidth={1.5} dot={false} name="Binance" connectNulls/>
        <Line type="monotone" dataKey="hl" stroke={C.sec} strokeWidth={1.5} dot={false} name="Hyperliquid" connectNulls/>
        <Legend/>
      </LineChart>
    </ResponsiveContainer>
  );
}

function GasTable(){
  return(
    <table>
      <thead><tr>
        <th>Year</th><th>Chain</th><th className="text-right">Avg Gas/Rebal</th><th>Note</th>
      </tr></thead>
      <tbody>
        {D.gas.map((g,i)=>(
          <tr key={i}>
            <td>{g.y}</td><td>{g.c}</td>
            <td className="text-right" style={{fontWeight:600,color:C.pri}}>${g.u.toFixed(2)}</td>
            <td style={{color:C.dim}}>{g.n}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function RebalLog({scenario}){
  const s=D.sc[scenario];
  if(!s||!s.rebs.length)return<p style={{color:C.dim}}>No rebalances.</p>;
  return(
    <div style={{maxHeight:300,overflowY:'auto'}}>
      <table style={{fontSize:12}}>
        <thead><tr style={{position:'sticky',top:0,background:C.card}}>
          <th>Date</th><th className="text-right">Move%</th><th className="text-right">ETHBTC</th>
          <th className="text-right">IL</th><th className="text-right">Gas</th>
          <th className="text-right">Slip</th><th className="text-right">BTC Before</th>
        </tr></thead>
        <tbody>
          {s.rebs.map((r,i)=>(
            <tr key={i}>
              <td>{r.d}</td>
              <td className="text-right" style={{color:r.mv>15?C.red:C.amb}}>{r.mv}%</td>
              <td className="text-right">{r.e}</td>
              <td className="text-right" style={{color:C.red}}>{r.il.toFixed(6)}</td>
              <td className="text-right">{r.g.toFixed(6)}</td>
              <td className="text-right">{r.s.toFixed(6)}</td>
              <td className="text-right" style={{fontWeight:600}}>{r.bk.toFixed(4)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function ScenarioCards(){
  return(
    <div className="grid-2">
      {Object.entries(D.sc).map(([k,s])=>(
        <div key={k} className="card" style={{borderLeft:'4px solid '+SC[k]}}>
          <div style={{padding:16}}>
            <div style={{fontSize:14,fontWeight:700,color:SC[k],marginBottom:8}}>{SL[k]}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:13}}>
              <div><span style={{color:C.dim}}>Final: </span><b>{s.final.toFixed(4)} BTC</b></div>
              <div><span style={{color:C.dim}}>CAGR: </span><b style={{color:s.cagr>=0?C.grn:C.red}}>{s.cagr}%</b></div>
              <div><span style={{color:C.dim}}>MaxDD: </span><span style={{color:C.red}}>{s.dd}%</span></div>
              <div><span style={{color:C.dim}}>CAGR/DD: </span><b>{s.ratio}</b></div>
              <div><span style={{color:C.dim}}>Days: </span>{s.days}</div>
              <div><span style={{color:C.dim}}>Rebals: </span>{s.nreb}</div>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function PoolCard({pool,expanded,toggle}){
  const scs=Object.entries(D.sc).filter(([k])=>k.startsWith(pool));
  const best=scs.reduce((a,[k,v])=>v.ratio>(D.sc[a]?.ratio||0)?k:a,scs[0]?.[0]);
  const s=D.sc[best];if(!s)return null;
  const fee=pool==='005'?'0.05%':'0.30%';
  const [sel,setSel]=useState(best);

  return(
    <div className="card">
      <div className="card-header" onClick={toggle}>
        <div>
          <h2 style={{fontSize:20,fontWeight:700,color:pool==='005'?C.pri:C.sec}}>WBTC/WETH {fee} Pool</h2>
          <p style={{color:C.dim,fontSize:13,marginTop:4}}>
            {s.start} → {s.end} · {s.days} days · Best: {SL[best]}
          </p>
        </div>
        <div style={{display:'flex',gap:20,alignItems:'center'}}>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:12,color:C.dim}}>Best CAGR</div>
            <div style={{fontSize:22,fontWeight:700,color:C.grn}}>{s.cagr}%</div>
          </div>
          <div style={{fontSize:24,color:C.dim,transform:expanded?'rotate(180deg)':'',transition:'0.3s'}}>▼</div>
        </div>
      </div>
      {expanded&&(
        <div style={{padding:'0 24px 24px',borderTop:'1px solid '+C.brd}}>
          <div style={{marginTop:16,display:'flex',gap:8,flexWrap:'wrap'}}>
            {scs.map(([k])=>(
              <button key={k} onClick={()=>setSel(k)} style={{
                padding:'6px 14px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',
                background:sel===k?SC[k]:'transparent',color:sel===k?'#000':SC[k],border:'1px solid '+SC[k]
              }}>{SL[k]}</button>
            ))}
          </div>
          <div style={{marginTop:16}}>
            <h3 style={{fontSize:16,fontWeight:600,marginBottom:12}}>BTC Balance — {fee}</h3>
            <BalanceChart keys={scs.map(([k])=>k)}/>
          </div>
          <div style={{marginTop:24}}>
            <PnLBars scenario={sel}/>
          </div>
          <div style={{marginTop:24}}>
            <h3 style={{fontSize:16,fontWeight:600,marginBottom:12}}>Rebalance Log — {SL[sel]}</h3>
            <RebalLog scenario={sel}/>
          </div>
          <div style={{marginTop:24}}>
            <h3 style={{fontSize:16,fontWeight:600,marginBottom:12}}>Pool Summary — {SL[sel]}</h3>
            <div className="grid-3">
              <div className="param-box">
                <div style={{fontSize:11,color:C.dim}}>Total Fee Income</div>
                <div style={{fontSize:18,fontWeight:700,color:C.grn}}>+{D.sc[sel].fees.toFixed(6)} BTC</div>
              </div>
              <div className="param-box">
                <div style={{fontSize:11,color:C.dim}}>Total IL Cost</div>
                <div style={{fontSize:18,fontWeight:700,color:C.red}}>{D.sc[sel].il.toFixed(6)} BTC</div>
              </div>
              <div className="param-box">
                <div style={{fontSize:11,color:C.dim}}>Net after All Costs</div>
                <div style={{fontSize:18,fontWeight:700,color:C.grn}}>
                  {(D.sc[sel].final-1).toFixed(6)} BTC ({D.sc[sel].cagr}% CAGR)
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Params(){
  const p=D.params;
  return(
    <div className="card" style={{padding:20}}>
      <h3 style={{fontSize:16,fontWeight:600,marginBottom:12,color:C.pri}}>Backtest Parameters</h3>
      <div className="grid-6">
        <div className="param-box"><div style={{fontSize:11,color:C.dim}}>Range Width</div><div style={{fontSize:18,fontWeight:700}}>{p.rw*100}%</div></div>
        <div className="param-box"><div style={{fontSize:11,color:C.dim}}>Multiplier</div><div style={{fontSize:18,fontWeight:700}}>{p.mult}x <span style={{fontSize:11,color:C.dim}}>286 ticks</span></div></div>
        <div className="param-box"><div style={{fontSize:11,color:C.dim}}>Slippage/Rebal</div><div style={{fontSize:18,fontWeight:700}}>{p.slip*100}%</div></div>
        <div className="param-box"><div style={{fontSize:11,color:C.dim}}>Hedge Ratio</div><div style={{fontSize:18,fontWeight:700}}>{p.hr*100}%</div></div>
        <div className="param-box"><div style={{fontSize:11,color:C.dim}}>Perp Fee RT</div><div style={{fontSize:18,fontWeight:700}}>{p.pfee*100}%</div></div>
        <div className="param-box"><div style={{fontSize:11,color:C.dim}}>SMA Crossover</div><div style={{fontSize:14,fontWeight:600}}>Golden: {p.sg}<br/>Death: {p.sd}</div></div>
      </div>
    </div>
  );
}

function FundingStats(){
  const bn=D.fn.filter(f=>f.bn!=null).map(f=>f.bn);
  const hl=D.fn.filter(f=>f.hl!=null).map(f=>f.hl);
  const bnAvg=bn.length?(bn.reduce((a,b)=>a+b,0)/bn.length).toFixed(2):'-';
  const hlAvg=hl.length?(hl.reduce((a,b)=>a+b,0)/hl.length).toFixed(2):'-';
  return(
    <div className="grid-3" style={{marginTop:16}}>
      <div className="param-box"><div style={{fontSize:11,color:C.dim}}>Binance Avg (2021-23)</div><div style={{fontSize:18,fontWeight:700,color:C.amb}}>{bnAvg}% ann.</div></div>
      <div className="param-box"><div style={{fontSize:11,color:C.dim}}>Hyperliquid Avg (2023-26)</div><div style={{fontSize:18,fontWeight:700,color:C.sec}}>{hlAvg}% ann.</div></div>
      <div className="param-box"><div style={{fontSize:11,color:C.dim}}>Hedge Ratio</div><div style={{fontSize:18,fontWeight:700}}>{D.params.hr*100}%</div></div>
    </div>
  );
}

function App(){
  const [exp005,setExp005]=useState(true);
  const [exp030,setExp030]=useState(false);
  const [tab,setTab]=useState('overview');

  const bestKey=useMemo(()=>{
    let bk=null,br=0;
    Object.entries(D.sc).forEach(([k,v])=>{if(v.ratio>br){br=v.ratio;bk=k;}});
    return bk;
  },[]);

  const allKeys=Object.keys(D.sc);
  const bs=D.sc[bestKey];

  const tabs=[
    {id:'overview',label:'Overview'},
    {id:'pools',label:'Pool Details'},
    {id:'costs',label:'Cost Analysis'},
    {id:'funding',label:'Funding & Hedge'},
    {id:'gas',label:'Gas Simulator'}
  ];

  return(
    <div style={{minHeight:'100vh'}}>
      <Header/>
      <div style={{padding:'12px 32px',borderBottom:'1px solid '+C.brd,display:'flex',gap:4,flexWrap:'wrap'}}>
        {tabs.map(t=>(
          <button key={t.id} className="tab-btn" onClick={()=>setTab(t.id)}
            style={{background:tab===t.id?C.pri:'transparent',color:tab===t.id?'#000':C.dim}}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{padding:'24px 32px',maxWidth:1400,margin:'0 auto'}}>

        {tab==='overview'&&(
          <div>
            <div className="flex-row" style={{marginBottom:24}}>
              <Metric label="Best Scenario" value={SL[bestKey]} sub={bs?.days+' days'} color={SC[bestKey]}/>
              <Metric label="CAGR" value={bs?.cagr+'%'} sub="BTC benchmark" color={C.grn}/>
              <Metric label="Max Drawdown" value={bs?.dd+'%'} sub="Peak-to-trough" color={C.red}/>
              <Metric label="CAGR/DD" value={bs?.ratio} sub="Risk-adjusted" color={C.pri}/>
              <Metric label="Final BTC" value={bs?.final.toFixed(4)} sub="From 1.0 BTC" color={C.grn}/>
            </div>
            <div className="card" style={{padding:24,marginBottom:24}}>
              <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>BTC Balance — All 8 Scenarios</h2>
              <BalanceChart keys={allKeys}/>
              <div style={{display:'flex',gap:16,marginTop:12,flexWrap:'wrap',justifyContent:'center'}}>
                {allKeys.map(k=>(
                  <div key={k} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
                    <div style={{width:12,height:3,background:SC[k],borderRadius:2}}/>
                    <span style={{color:C.dim}}>{SL[k]}</span>
                  </div>
                ))}
              </div>
            </div>
            <ScenarioCards/>
          </div>
        )}

        {tab==='pools'&&(
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <PoolCard pool="005" expanded={exp005} toggle={()=>setExp005(!exp005)}/>
            <PoolCard pool="030" expanded={exp030} toggle={()=>setExp030(!exp030)}/>
          </div>
        )}

        {tab==='costs'&&(
          <div>
            <div className="card" style={{padding:24,marginBottom:24}}>
              <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>Cost Summary — All Scenarios (BTC)</h2>
              <CostTable/>
            </div>
            <Params/>
            <div style={{marginTop:24}}><PnLBars scenario={bestKey}/></div>
          </div>
        )}

        {tab==='funding'&&(
          <div>
            <div className="card" style={{padding:24,marginBottom:24}}>
              <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>Funding Rates — Binance vs Hyperliquid</h2>
              <FundingChart/>
              <FundingStats/>
            </div>
          </div>
        )}

        {tab==='gas'&&(
          <div>
            <div className="card" style={{padding:24,marginBottom:24}}>
              <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>Gas Fee Reference — Arbitrum by Year</h2>
              <GasTable/>
            </div>
            <Params/>
          </div>
        )}
      </div>
      <div style={{padding:'24px 32px',borderTop:'1px solid '+C.brd,textAlign:'center',color:C.dim,fontSize:12,marginTop:40}}>
        DeltaYield V3 · Real Data Only · Sources: The Graph, Binance API, Hyperliquid API, Arbitrum RPC · 0.94x from 286 On-Chain Ticks
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
